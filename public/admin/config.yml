backend:
  name: git-gateway
  repo: zsnourish/pulse-docs
  branch: main
  identity_url: https://auth.decapbridge.com/sites/abd6658d-45db-4463-96fc-c81b34caf13e
  gateway_url: https://gateway.decapbridge.com

# Draft -> review -> publish, matching how the team already reviews Pulse PRs.
publish_mode: editorial_workflow

media_folder: "src/assets/uploads"
public_folder: "/uploads"

# Three content categories, mirroring the left nav on the live site. Decap's
# folder-per-category is what actually drives Starlight's grouped sidebar —
# a single collection with a "category" dropdown can't reliably route files
# into different folders (a known Decap limitation), so each category is its
# own collection here. Functionally it's the same authoring step: pick which
# of the three you're writing, exactly like picking a tag.
#
# Note on "doc" fields: there's no manual "last updated" or "created by" field
# below — that's intentional. The live site reads those automatically from
# git commit history (see src/remark-git-author.mjs + Starlight's lastUpdated
# config), so nothing needs typing in and nothing can drift from the truth.
collections:
  - name: "foundations"
    label: "Foundations"
    label_singular: "doc"
    folder: "src/content/docs/foundations"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["draft", "in-review", "approved", "deprecated"]
        default: "draft"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
        modes: ["rich_text"]
        editor_components: ["do", "dont", "image"]
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "bulleted-list", "numbered-list", "quote"]

  - name: "components"
    label: "Components"
    label_singular: "doc"
    folder: "src/content/docs/components"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["draft", "in-review", "approved", "deprecated"]
        default: "draft"
      - label: "Body"
        name: "body"
        widget: "markdown"
        modes: ["rich_text"]
        editor_components: ["do", "dont", "image"]
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "bulleted-list", "numbered-list", "quote"]

  - name: "visuals"
    label: "Visuals"
    label_singular: "doc"
    folder: "src/content/docs/visuals"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["draft", "in-review", "approved", "deprecated"]
        default: "draft"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
        modes: ["rich_text"]
        editor_components: ["do", "dont", "image"]
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "bulleted-list", "numbered-list", "quote"]
