backend:
  name: git-gateway
  repo: zsnourish/pulse-docs
  branch: main
  identity_url: https://auth.decapbridge.com/sites/abd6658d-45db-4463-96fc-c81b34caf13e
  gateway_url: https://gateway.decapbridge.com

# Draft -> review -> publish, matching how the team already reviews Pulse PRs.
publish_mode: editorial_workflow

media_folder: "src/assets/uploads"
public_folder: "/uploads"

# One Decap collection per nav category/sub-category, mirroring the left
# nav on the live site. Decap's folder-per-category is what actually drives
# Starlight's grouped sidebar — a single collection with a "category"
# dropdown can't reliably route files into different folders (a known Decap
# limitation), so each category (and, where the nav has sub-categories like
# Components and Voice, each sub-category) gets its own collection here.
# Functionally it's the same authoring step: pick which one you're writing,
# exactly like picking a tag.
#
# Note on "doc" fields: there's no manual "last updated" or "created by" field
# below — that's intentional. The live site reads those automatically from
# git commit history (see src/components/EditLinkWithHistory.astro +
# Starlight's lastUpdated config), so nothing needs typing in and nothing can
# drift from the truth.
#
# `label_singular` is deliberately different per collection, and prefixed
# with the parent nav category for anything that sits under a sub-category
# ("Components — Actions doc", "Voice — Content Design doc") — that's what
# shows in the "Quick add" dropdown, and the flat list was hard to navigate
# without that prefix. Collections are also listed below in the same order
# as the live site's left nav, since that's the order Decap uses for both
# "Quick add" and the Collections sidebar.
collections:
  - name: "foundations"
    label: "Foundations"
    label_singular: "Foundations doc"
    folder: "src/content/docs/foundations"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["draft", "in-review", "approved", "deprecated"]
        default: "draft"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
        modes: ["rich_text"]
        editor_components: ["do", "dont", "embed"]
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "bulleted-list", "numbered-list", "quote"]
        default: |
          ## Overview

          What is this, and why does it exist?

          ## Guidance

          <div class="ds-callout ds-do">
          <p><strong>✓ Do</strong> — </p>
          </div>

          <div class="ds-callout ds-dont">
          <p><strong>✗ Don't</strong> — </p>
          </div>

